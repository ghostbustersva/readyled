<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            /* Base visual size for each LED pixel (1em × 1em in the sign). */
            --readyled-pixel-font-size: 4px;
            /* Gap between LED pixels. */
            --readyled-pixel-margin: 0.1em;
        }

        @font-face {
            font-family: "Elan";
            src: local("Elan AT Medium"), url("elan.woff2") format("woff2");
        }

        #readyled-config {
            white-space: pre;
            font-family: monospace;
        }

        .readyled-sign {
            font-size: var(--readyled-pixel-font-size);
            line-height: 0;

            overflow-x: hidden;
            background-color: #000;
        }

        .readyled-pixel {
            display: inline-block;
            margin: var(--readyled-pixel-margin);
            border-radius: 50%;
        }

        .readyled-pixel-on {
            background-color: red;
        }
    </style>
</head>
<body>
    <div contenteditable="true" id="readyled-config">
        {
          "font": "Elan",
          "fallbackFont": "Arial",
          "fontCheckInterval": 100,
          "maxWait": 3,
          "pixelHeight": 10,
          "scrollSpeed": 150,
          "signWidth": 320,
          "text": "WE'RE READY TO BELIEVE YOU! (804) 482-1217 -"
        }
    </div>
    <div>
        <button id="startButton">START</button>
    </div>
    <script type="module">
        import { readyLED} from './dist/readyled.js';
        const startLED = () => {
            const readyLEDConfig = document.getElementById('readyled-config');
            if (readyLEDConfig) {
                readyLED({
                    target: document.body,
                    ...JSON.parse(readyLEDConfig.innerText),
                });
            }
        };
        document.getElementById('startButton').onclick = startLED;
        startLED();
    </script>
</body>
</html>
