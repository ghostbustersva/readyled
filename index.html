<!DOCTYPE html>
<html>
<head>
    <style>
        @font-face {
            font-family: "Elan";
            src: local("Elan AT Medium"), url("elan.woff2") format("woff2");
        }

        .readyled-sign {
            font-size: 4px;
            line-height: 0px;

            overflow-x: hidden;
            background-color: #000;
        }

        .readyled-pixel {
            display: inline-block;
            margin: 0.1em;
            border-radius: 50%;
        }

        .readyled-pixel-on {
            background-color: red;
        }

        #font-loader {
            position: absolute;
            top: -300px;
            left: -10000px;
        }
    </style>
</head>
<body>
    <div id="font-loader">
        <span style="font-family: Elan">Elan</span>
    </div>
    <script type="module" src="./dist/readyled.js"></script>
</body>
</html>
