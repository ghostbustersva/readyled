<!DOCTYPE html>
<html>
<head>
    <style>
        @font-face {
            font-family: "Elan";
            src: local("Elan AT Medium"), url("elan.woff2") format("woff2");
        }

        .readyled-sign {
            font-size: 4px;
            line-height: 0px;

            overflow-x: hidden;
            background-color: #000;
        }

        .readyled-pixel {
            display: inline-block;
            margin: 0.1em;
            border-radius: 50%;
        }

        .readyled-pixel-on {
            background-color: red;
        }

        #font-loader {
            position: absolute;
            top: -300px;
            left: -10000px;
        }
    </style>
</head>
<body>
    <div id="font-loader">
        <span style="font-family: Elan">Elan</span>
    </div>
    <div contenteditable="true" id="readyled-config">
        {
        "font": "Elan",
        "pixelHeight": 10,
        "scrollSpeed": 150,
        "signWidth": 320,
        "text": "WE'RE READY TO BELIEVE YOU! (804) 482-1217 -"
        }
    </div>
    <div>
        <button id="startButton">START</button>
    </div>
    <script type="module">
        import { readyLED} from './dist/readyled.js';
        const startLED = () => {
            const readyLEDConfig = document.getElementById('readyled-config');
            if (readyLEDConfig) {
                readyLED({
                    target: document.body,
                    ...JSON.parse(readyLEDConfig.innerText),
                });
            }
        };
        document.getElementById('startButton').onclick = startLED;
    </script>
</body>
</html>
